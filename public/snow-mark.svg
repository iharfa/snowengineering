<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <g transform="translate(120 120)" stroke-linecap="square" stroke-linejoin="round" fill="none">
    <!-- 6 arms; one (top) accented in cyan, rest steel grey -->
    <g stroke="#808080" stroke-width="7">
      <g>
        <line x1="0" y1="0" x2="0" y2="-104"/>
        <line x1="0" y1="-40" x2="-20" y2="-58"/><line x1="0" y1="-40" x2="20" y2="-58"/>
        <line x1="0" y1="-74" x2="-16" y2="-90"/><line x1="0" y1="-74" x2="16" y2="-90"/>
      </g>
      <g transform="rotate(60)">
        <line x1="0" y1="0" x2="0" y2="-104"/>
        <line x1="0" y1="-40" x2="-20" y2="-58"/><line x1="0" y1="-40" x2="20" y2="-58"/>
        <line x1="0" y1="-74" x2="-16" y2="-90"/><line x1="0" y1="-74" x2="16" y2="-90"/>
      </g>
      <g transform="rotate(120)">
        <line x1="0" y1="0" x2="0" y2="-104"/>
        <line x1="0" y1="-40" x2="-20" y2="-58"/><line x1="0" y1="-40" x2="20" y2="-58"/>
        <line x1="0" y1="-74" x2="-16" y2="-90"/><line x1="0" y1="-74" x2="16" y2="-90"/>
      </g>
      <g transform="rotate(180)">
        <line x1="0" y1="0" x2="0" y2="-104"/>
        <line x1="0" y1="-40" x2="-20" y2="-58"/><line x1="0" y1="-40" x2="20" y2="-58"/>
        <line x1="0" y1="-74" x2="-16" y2="-90"/><line x1="0" y1="-74" x2="16" y2="-90"/>
      </g>
      <g transform="rotate(240)">
        <line x1="0" y1="0" x2="0" y2="-104"/>
        <line x1="0" y1="-40" x2="-20" y2="-58"/><line x1="0" y1="-40" x2="20" y2="-58"/>
        <line x1="0" y1="-74" x2="-16" y2="-90"/><line x1="0" y1="-74" x2="16" y2="-90"/>
      </g>
    </g>
    <!-- accent arm -->
    <g transform="rotate(300)" stroke="#0090D0" stroke-width="8">
      <line x1="0" y1="0" x2="0" y2="-104"/>
      <line x1="0" y1="-40" x2="-20" y2="-58"/><line x1="0" y1="-40" x2="20" y2="-58"/>
      <line x1="0" y1="-74" x2="-16" y2="-90"/><line x1="0" y1="-74" x2="16" y2="-90"/>
    </g>
    <circle cx="0" cy="0" r="9" fill="#303030"/>
  </g>
